name: Build and Release
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            label: windows
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb
            label: linux
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
            label: macos

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - name: Install & build frontend
        run: |
          bun install
          bun run build
        working-directory: frontend

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri
        run: |
          if [ -n "${{ matrix.bundles }}" ]; then
            cargo tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          else
            cargo tauri build --target ${{ matrix.target }}
          fi
        shell: bash
        working-directory: backend

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.label }}
          path: |
            backend/target/${{ matrix.target }}/release/bundle/**/*.exe
            backend/target/${{ matrix.target }}/release/bundle/**/*.deb
            backend/target/${{ matrix.target }}/release/bundle/**/*.dmg
            backend/target/${{ matrix.target }}/release/bundle/**/*.rpm
            backend/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            backend/target/${{ matrix.target }}/release/bundle/**/*.msi
            backend/target/${{ matrix.target }}/release/bundle/**/*.tar.gz
            backend/target/${{ matrix.target }}/release/bundle/**/*.sig
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=v$(jq -r '.version' backend/tauri.conf.json)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Rename assets with platform prefix
        shell: bash
        run: |
          mkdir -p assets
          for dir in bundle-*/; do
            label="${dir#bundle-}"
            label="${label%/}"
            find "$dir" -type f -exec sh -c '
              src="$1"
              label="$3"
              b=$(basename "$src")
              n=${b%.*}
              x=${b#$n}
              cp "$src" "assets/${n}_${label}${x}"
            ' sh {} "$dir" "$label" \;
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          draft: true
          files: assets/*
