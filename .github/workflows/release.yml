name: Build and Release
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb
            label: linux
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
            label: macos

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - name: Install & build frontend
        run: |
          bun install
          bun run build
        working-directory: frontend

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri
        run: |
          bundles_arg="${{ matrix.bundles }}"
          cargo tauri build --target ${{ matrix.target }} ${bundles_arg:+--bundles "$bundles_arg"}
        shell: bash
        working-directory: backend

      - name: Create 7z SFX (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = (Get-Content backend/tauri.conf.json | ConvertFrom-Json).version
          $arch = "${{ matrix.target }}" -replace "x86_64.*","x64" -replace "aarch64.*","arm64"
          $fileName = "FrpcTray_${version}_${arch}_setup"
          $releaseDir = "backend/target/${{ matrix.target }}/release"
          $appName = "FrpcTray"

          cd $releaseDir
          7z a -t7z -m0=lzma2 -mx=9 archive.7z "$appName.exe" "*.dll"

          $config = ';!@Install@!UTF-8!' + "`r`n" +
            "Title=`"FrpcTray $version`"" + "`r`n" +
            "RunProgram=`"$appName.exe`"" + "`r`n" +
            ';!@InstallEnd@!'
          $config | Out-File -Encoding utf8NoBOM config.txt

          $7zSfxPath = "C:\Program Files\7-Zip\7z.sfx"
          if (-not (Test-Path $7zSfxPath)) {
            Write-Error "7-Zip SFX not found at $7zSfxPath"
            exit 1
          }
          & cmd /c "copy /b `"$7zSfxPath`" + config.txt + archive.7z `"$fileName.exe`" >nul"
          Remove-Item config.txt, archive.7z

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-windows
          path: backend/target/${{ matrix.target }}/release/*_setup.exe
          if-no-files-found: error

      - name: Upload artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.label }}
          path: |
            backend/target/${{ matrix.target }}/release/bundle/**/*.deb
            backend/target/${{ matrix.target }}/release/bundle/**/*.dmg
            backend/target/${{ matrix.target }}/release/bundle/**/*.rpm
            backend/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            backend/target/${{ matrix.target }}/release/bundle/**/*.sig
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=v$(jq -r '.version' backend/tauri.conf.json)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Rename assets with platform prefix
        shell: bash
        run: |
          mkdir -p assets
          for dir in bundle-*/; do
            label="${dir#bundle-}"
            label="${label%/}"
            find "$dir" -type f -exec sh -c '
              src="$1"
              label="$3"
              b=$(basename "$src")
              n=${b%.*}
              x=${b#$n}
              cp "$src" "assets/${n}_${label}${x}"
            ' sh {} "$dir" "$label" \;
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          draft: true
          files: assets/*
